kind = "web"
previewPath = "/"
title = "Alexandra Kautsch – Energiearbeit & Reiki"
version = "1.0.0"
id = "artifacts/alexandra-kautsch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23938
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/alexandra-kautsch run dev"

[services.env]
PORT = "23938"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/alexandra-kautsch", "run", "build"]
publicDir = "artifacts/alexandra-kautsch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
